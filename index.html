<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부활의 아침: 진노의 잔 - 메인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .screen { display: none !important; }
        .screen.active { display: flex !important; flex-direction: column; flex-grow: 1; position: relative; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="h-screen w-full overflow-hidden text-slate-800 flex flex-col relative">

    <div id="loading-overlay" class="absolute inset-0 bg-slate-900 z-50 flex flex-col items-center justify-center text-white">
        <i class="fas fa-cross fa-spin text-5xl text-purple-500 mb-4" style="animation-duration: 3s;"></i>
        <h2 class="text-xl font-bold">서버에 접속 중입니다...</h2>
    </div>

    <!-- SCREEN 0: 접속 역할 선택 -->
    <div id="screen-login" class="screen h-full items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-slate-200">
            <h1 class="text-3xl font-black text-purple-800 mb-1">✝️ 부활의 아침</h1>
            <h2 class="text-xl font-bold text-slate-600 mb-8">진노의 잔 (Cup of Wrath)</h2>
            <div class="space-y-4">
                <button onclick="showPlayerLogin()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl shadow-lg transition text-xl flex items-center justify-center">
                    <i class="fas fa-mobile-alt mr-3"></i> 참가자 (스마트폰)
                </button>
                <div class="h-px bg-slate-200 my-4"></div>
                <button onclick="checkGMAndSetRole()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl shadow transition flex items-center justify-center">
                    <i class="fas fa-user-shield mr-3"></i> 진행자 (GM 통제실) 🔒
                </button>
                <p class="text-xs text-slate-400 mt-2">* 방송실 대형 스크린은 송출 전용 링크로 접속해주세요.</p>
            </div>
        </div>
    </div>

    <!-- 참가자 이름 입력 모달 -->
    <div id="player-name-modal" class="hidden absolute inset-0 bg-slate-900 bg-opacity-80 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full">
            <h3 class="text-lg font-bold text-slate-800 mb-2">당신의 이름을 입력하세요</h3>
            <p class="text-xs text-red-500 mb-4">* 만약 튕겼다면 기존과 똑같은 이름을 쓰세요!</p>
            <input type="text" id="player-name-input" placeholder="실명 입력" class="w-full px-4 py-3 border-2 border-purple-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-600 mb-4 font-bold text-lg text-center">
            <button onclick="joinAsPlayer()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow">입장하기</button>
            <button onclick="document.getElementById('player-name-modal').classList.add('hidden')" class="w-full mt-2 text-slate-500 py-2">취소</button>
        </div>
    </div>

    <!-- SCREEN 1: 참가자 (모바일) 화면 -->
    <div id="screen-player" class="screen h-full bg-slate-100 overflow-y-auto">
        <header class="bg-purple-800 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
            <div class="font-bold text-lg"><i class="fas fa-user mr-2"></i><span id="p-my-name">이름</span></div>
            <div class="bg-purple-950 px-3 py-1 rounded-full text-sm font-bold shadow-inner border border-purple-600 flex items-center">
                <i class="fas fa-tint text-blue-300 mr-1"></i> 눈물: <span id="p-my-tokens" class="text-white ml-1">15</span>개
            </div>
        </header>

        <div class="p-4 flex-grow flex flex-col">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 text-center mb-4 transition-all" id="p-status-container">
                <h2 class="text-2xl font-black text-purple-700" id="p-status-title">대기 중</h2>
                <p class="text-sm text-slate-600 mt-2" id="p-status-desc">진행자의 지시를 기다리세요.</p>
            </div>

            <!-- 보유한 잔 목록과 합계를 보여주는 영역 (개선됨) -->
            <div class="bg-slate-800 text-white p-4 rounded-xl shadow-inner mb-6 flex flex-col">
                <div class="flex justify-between items-center border-b border-slate-600 pb-2 mb-3">
                    <div class="text-sm font-bold text-slate-300">내가 짊어진 십자가 합계:</div>
                    <div class="font-black text-red-400 text-xl" id="p-my-cards-sum">0 점</div>
                </div>
                <div class="text-xs text-slate-400 mb-2"><i class="fas fa-list-ul mr-1"></i>보유한 진노의 잔 목록:</div>
                <div id="p-my-cards-list" class="flex flex-wrap gap-2">
                    <!-- JS에서 카드 목록을 주입합니다 -->
                </div>
            </div>

            <div id="p-action-area" class="flex-grow flex flex-col justify-center"></div>
        </div>
    </div>

    <!-- SCREEN 2: 진행자 (GM) 화면 -->
    <div id="screen-gm" class="screen h-full bg-slate-50 overflow-hidden">
        <header class="bg-slate-800 text-white p-3 shadow-sm flex justify-between items-center border-b border-slate-700">
            <h1 class="text-lg font-black text-slate-200"><i class="fas fa-sliders-h text-yellow-400 mr-2"></i>GM 통제실 (턴제)</h1>
            <button onclick="resetGame()" class="bg-red-600 px-3 py-1 rounded text-xs font-bold shadow hover:bg-red-700 transition">데이터 초기화</button>
        </header>
        
        <div class="p-4 flex-grow overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="bg-white p-5 rounded-xl shadow border border-slate-200 border-l-4 border-l-purple-600 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="font-black text-lg text-purple-800">🎮 현재 상태: <span id="gm-current-phase" class="text-slate-600">대기방</span></h2>
                    <span class="bg-slate-200 text-slate-700 px-2 py-1 rounded text-xs font-bold" id="gm-cup-info">잔: 없음</span>
                </div>
                
                <div class="space-y-4 flex-grow" id="gm-controls">
                    <button onclick="gmStartRound()" class="w-full py-4 bg-purple-100 hover:bg-purple-200 text-purple-800 font-black text-lg border border-purple-300 rounded-xl shadow-md transition flex flex-col items-center">
                        <i class="fas fa-play-circle text-2xl mb-1"></i>
                        <span>새로운 잔 뽑기 및 라운드 시작</span>
                        <span class="text-xs font-normal text-purple-600 mt-1">(자동으로 순서를 섞고 턴을 시작합니다)</span>
                    </button>
                </div>

                <div class="mt-6 pt-4 border-t border-slate-200">
                    <button onclick="gmTriggerResurrection()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white font-black rounded-xl shadow-lg transform transition hover:scale-[1.02] flex justify-center items-center">
                        <i class="fas fa-sun mr-2"></i> 최종장: 부활의 대반전 실행!
                    </button>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow border border-slate-200 flex flex-col">
                <h2 class="font-bold border-b pb-2 mb-3 flex justify-between items-center">
                    <span>👥 참가자 현황 (<span id="gm-player-count">0</span>명)</span>
                </h2>
                <div id="gm-player-status-list" class="flex-grow overflow-y-auto space-y-2 max-h-80">
                    <!-- JS renders player status rows -->
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 🚨 여기에 목사님의 파이어베이스 주소를 넣으세요 🚨
        const myFirebaseConfig = {
            apiKey: "AIzaSyCfyjgtiDVD4Wsd9iGb9tEdrOGFYxxN2Tw",
            authDomain: "kingdomgenius.firebaseapp.com",
            projectId: "kingdomgenius",
            storageBucket: "kingdomgenius.firebasestorage.app",
            messagingSenderId: "385557748196",
            appId: "1:385557748196:web:457b999a38e4982f188ff1"
        };
        
        let app, auth, db, docRef;
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            app = initializeApp(JSON.parse(__firebase_config));
            db = getFirestore(app);
            docRef = doc(db, 'artifacts', 'kg-app', 'public', 'data', 'room_easter', 'state');
        } else {
            app = initializeApp(myFirebaseConfig);
            db = getFirestore(app);
            docRef = doc(db, 'kingdom_genius_games', 'easter_room', 'data', 'state');
        }
        
        auth = getAuth(app);

        window.myUid = null;
        window.myRole = null; 
        window.gameState = null; 

        const DEFAULT_STATE = {
            phase: 'lobby', // lobby, bidding, resolved, resurrection
            cup: { penalty: 0, tokens: 0 }, 
            turnOrder: [],
            currentTurnIndex: 0,
            players: {},    
            lastResult: null,
            resurrectedUid: null
        };

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { alert("인증 오류가 발생했습니다: " + error.message); document.getElementById('loading-overlay').classList.add('hidden'); }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) { window.myUid = user.uid; document.getElementById('loading-overlay').classList.add('hidden'); switchScreen('screen-login'); setupRealtimeListener(); }
        });

        async function setupRealtimeListener() {
            if (!window.myUid || !docRef) return;
            try {
                const snap = await getDoc(docRef);
                if (!snap.exists()) await setDoc(docRef, DEFAULT_STATE);
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) { window.gameState = docSnap.data(); updateUIBasedOnRole(); }
                });
            } catch(e) { alert("데이터베이스 접근 권한이 없습니다."); }
        }

        window.switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        };

        window.checkGMAndSetRole = () => {
            const pwd = prompt("진행자(GM) 접속 비밀번호를 입력하세요.\n(기본: 1004)");
            if (pwd === "1004") { window.myRole = 'gm'; switchScreen('screen-gm'); updateUIBasedOnRole(); } 
            else if (pwd !== null) alert("❌ 비밀번호가 틀렸습니다.");
        };

        window.showPlayerLogin = () => { document.getElementById('player-name-modal').classList.remove('hidden'); };

        window.joinAsPlayer = async () => {
            const nameInput = document.getElementById('player-name-input').value.trim();
            if(!nameInput) return alert("이름을 입력하세요.");
            document.getElementById('player-name-modal').classList.add('hidden');
            window.myRole = 'player';
            
            if (!window.gameState) window.gameState = JSON.parse(JSON.stringify(DEFAULT_STATE)); 
            let players = window.gameState.players || {};
            let existingUid = Object.keys(players).find(uid => players[uid].name === nameInput);

            if (existingUid) {
                if (existingUid !== window.myUid) { players[window.myUid] = players[existingUid]; delete players[existingUid]; }
            } else {
                if(!players[window.myUid]) players[window.myUid] = { name: nameInput, tokens: 15, cards: [], connected: true };
            }
            
            try {
                let updateData = { players: players };
                if (!window.gameState.cup) updateData.cup = { penalty: 0, tokens: 0 };
                if (!window.gameState.phase) updateData.phase = 'lobby';
                await setDoc(docRef, updateData, { merge: true });
                switchScreen('screen-player');
            } catch (error) {
                alert("서버 저장 실패!"); window.myRole = null; switchScreen('screen-login');
            }
        };

        function updateUIBasedOnRole() {
            if(!window.gameState) return;
            if(window.myRole === 'player') updatePlayerUI();
            if(window.myRole === 'gm') updateGMUI();
        }

        // ==========================================
        // 참가자 화면 로직 (카드 목록 표시 기능 추가)
        // ==========================================
        function updatePlayerUI() {
            const state = window.gameState || DEFAULT_STATE;
            const players = state.players || {};
            const myData = players[window.myUid];
            if(!myData) return;

            const phase = state.phase || 'lobby';
            document.getElementById('p-my-name').innerText = myData.name || "참가자";
            document.getElementById('p-my-tokens').innerText = myData.tokens || 0;
            document.getElementById('p-my-cards-sum').innerText = `${calculatePenalty(myData.cards || [])} 점`;

            // 🔥 보유한 잔 목록 HTML 렌더링 🔥
            let sortedCards = [...(myData.cards || [])].sort((a,b) => b - a); // 내림차순 (-1, -2, -3)
            let cardsHtml = '';
            for(let i = 0; i < sortedCards.length; i++) {
                // 이전 카드와 1차이 나면 연속된 숫자로 간주되어 무효화 (면제됨)
                let isIgnored = (i > 0 && sortedCards[i] - sortedCards[i-1] === -1);
                if(isIgnored) {
                    cardsHtml += `<span class="bg-slate-700 text-slate-400 px-3 py-1.5 rounded text-sm font-bold line-through border border-slate-600 opacity-60" title="연속된 십자가의 은혜로 점수 면제!">${sortedCards[i]}</span>`;
                } else {
                    cardsHtml += `<span class="bg-red-900 text-red-100 px-3 py-1.5 rounded text-sm font-bold border border-red-700 shadow-sm">${sortedCards[i]}</span>`;
                }
            }
            if(sortedCards.length === 0) {
                cardsHtml = `<span class="text-slate-500 text-sm">아직 마신 잔이 없습니다.</span>`;
            }
            document.getElementById('p-my-cards-list').innerHTML = cardsHtml;

            const title = document.getElementById('p-status-title');
            const desc = document.getElementById('p-status-desc');
            const actionArea = document.getElementById('p-action-area');
            const statusContainer = document.getElementById('p-status-container');
            actionArea.innerHTML = '';

            statusContainer.classList.remove('bg-purple-100', 'border-purple-400');
            statusContainer.classList.add('bg-white', 'border-slate-200');

            if (phase === 'lobby') {
                title.innerText = "대기 중"; title.className = "text-2xl font-black text-purple-700";
                desc.innerText = "게임을 준비하고 있습니다.";
            } else if (phase === 'bidding') {
                const currentUid = state.turnOrder[state.currentTurnIndex];
                const isMyTurn = (currentUid === window.myUid);
                const currentName = players[currentUid] ? players[currentUid].name : '누군가';

                if (isMyTurn) {
                    statusContainer.classList.remove('bg-white', 'border-slate-200');
                    statusContainer.classList.add('bg-purple-100', 'border-purple-400'); // 내 턴 강조
                    title.innerText = "당신의 차례입니다!"; 
                    title.className = "text-3xl font-black text-purple-700 animate-pulse";
                    desc.innerHTML = `현재 잔: <strong class="text-red-600 text-lg">${state.cup.penalty}</strong> (눈물 <strong class="text-blue-600">${state.cup.tokens}</strong>개)`;

                    const canPass = myData.tokens > 0;
                    actionArea.innerHTML = `
                        <div class="flex flex-col gap-4 mt-2">
                            <button onclick="window.submitAction('pass')" class="w-full ${canPass ? 'bg-blue-500 hover:bg-blue-600' : 'bg-slate-400 cursor-not-allowed'} text-white font-black text-2xl py-6 rounded-xl shadow-lg border-b-4 ${canPass ? 'border-blue-700' : 'border-slate-500'} transition" ${!canPass ? 'disabled' : ''}>
                                ${canPass ? '➡️ 외면하기 (눈물 -1)' : '❌ 눈물 0개 (외면 불가)'}
                            </button>
                            <button onclick="window.submitAction('drink')" class="w-full bg-red-600 hover:bg-red-700 text-white font-black text-2xl py-6 rounded-xl shadow-lg border-b-4 border-red-800 transition mt-2">
                                🍷 잔 마시기 (십자가 지기)
                            </button>
                        </div>
                    `;
                } else {
                    title.innerText = "다른 사람의 차례"; title.className = "text-xl font-bold text-slate-500";
                    desc.innerHTML = `<span class="text-2xl font-black text-purple-600">${currentName}</span> 님의 선택을 기다리는 중...`;
                    actionArea.innerHTML = `<div class="flex justify-center mt-10"><i class="fas fa-hourglass-half text-6xl text-slate-300 animate-spin"></i></div>`;
                }
            } else if (phase === 'resolved') {
                title.innerText = "결과 발표"; title.className = "text-2xl font-black text-slate-700";
                desc.innerText = "스크린에서 누가 잔을 마셨는지 확인하세요.";
            } else if (phase === 'resurrection') {
                title.innerText = "부활의 아침!"; title.className = "text-3xl font-black text-yellow-500";
                let finalScore = (myData.tokens || 0) + calculateResurrectionScore(myData.cards || [], state.resurrectedUid === window.myUid);
                desc.innerHTML = `최종 점수: <b class="text-2xl text-purple-800">${finalScore}점</b><br>화면을 확인하세요!`;
            }
        }

        window.submitAction = async (action) => {
            const state = window.gameState;
            let players = state.players || {};
            let cup = state.cup;

            if (action === 'pass') {
                if (players[window.myUid].tokens <= 0) return;
                players[window.myUid].tokens -= 1;
                cup.tokens += 1;
                let nextIndex = (state.currentTurnIndex + 1) % state.turnOrder.length;
                await setDoc(docRef, { players: players, cup: cup, currentTurnIndex: nextIndex }, { merge: true });
            } 
            else if (action === 'drink') {
                let winner = players[window.myUid];
                if (!winner.cards) winner.cards = [];
                winner.cards.push(cup.penalty);
                winner.cards.sort((a,b) => b - a);
                winner.tokens += cup.tokens;

                let lastResult = `<span class="text-red-500 font-black">${winner.name}</span>님이<br>잔을 마셨습니다!<br><span class="text-3xl text-slate-300 mt-4 block">패널티 ${cup.penalty} / 눈물 ${cup.tokens}개 획득</span>`;
                
                await setDoc(docRef, { 
                    phase: 'resolved', 
                    players: players, 
                    cup: { penalty: 0, tokens: 0 }, 
                    lastResult: lastResult 
                }, { merge: true });
            }
        };

        // ==========================================
        // GM UI LOGIC
        // ==========================================
        function updateGMUI() {
            const state = window.gameState || DEFAULT_STATE;
            const players = state.players || {};
            const cup = state.cup || { penalty: 0, tokens: 0 };
            const phase = state.phase || 'lobby';
            
            const pKeys = Object.keys(players);
            document.getElementById('gm-player-count').innerText = pKeys.length;
            
            const phaseNames = { lobby:'대기방', bidding:'턴 진행 중 (루핑)', resolved:'라운드 종료', resurrection:'부활 완료' };
            document.getElementById('gm-current-phase').innerText = phaseNames[phase] || phase;
            
            if(cup.penalty < 0) {
                document.getElementById('gm-cup-info').innerText = `현재 잔: ${cup.penalty} (눈물 ${cup.tokens}개)`;
                document.getElementById('gm-cup-info').className = "bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold";
            } else {
                document.getElementById('gm-cup-info').innerText = "잔: 없음";
                document.getElementById('gm-cup-info').className = "bg-slate-200 text-slate-700 px-2 py-1 rounded text-xs font-bold";
            }

            const statusList = document.getElementById('gm-player-status-list');
            statusList.innerHTML = '';
            
            const currentUid = state.turnOrder ? state.turnOrder[state.currentTurnIndex] : null;

            pKeys.forEach(uid => {
                const p = players[uid];
                const cCards = p.cards || [];
                const isTurn = (uid === currentUid && phase === 'bidding');
                const statusIcon = isTurn ? '<span class="text-yellow-500 font-bold animate-pulse">▶ 이 사람 턴</span>' : '<span class="text-slate-400">대기</span>';
                
                statusList.innerHTML += `
                    <div class="border rounded p-3 text-sm flex justify-between items-center ${isTurn ? 'bg-yellow-50 border-yellow-400' : 'bg-slate-50'}">
                        <div class="font-bold ${isTurn ? 'text-yellow-700' : 'text-slate-800'} w-1/3 truncate">${p.name}</div>
                        <div class="text-xs text-slate-500 w-1/3 text-center">눈물:${p.tokens} / 십자가:${calculatePenalty(cCards)}</div>
                        <div class="w-1/3 text-right">${statusIcon}</div>
                    </div>
                `;
            });
        }

        window.gmStartRound = async () => {
            const state = window.gameState || DEFAULT_STATE;
            let players = state.players || {};
            const pKeys = Object.keys(players);
            if(pKeys.length === 0) return alert("접속한 참가자가 없습니다!");

            const penalty = -1 * (Math.floor(Math.random() * 20) + 1);
            let turnOrder = [...pKeys].sort(() => 0.5 - Math.random());

            await setDoc(docRef, { 
                phase: 'bidding', 
                cup: { penalty: penalty, tokens: 0 },
                turnOrder: turnOrder,
                currentTurnIndex: 0,
                lastResult: null
            }, { merge: true });
        };

        window.gmTriggerResurrection = async () => {
            if(!confirm("부활의 반전을 실행하시겠습니까? 십자가를 가장 많이 진 사람이 승리합니다!")) return;
            const state = window.gameState || DEFAULT_STATE;
            let players = state.players || {};
            let maxPenalty = 0, resurrectedUid = null;
            Object.keys(players).forEach(uid => {
                let pen = Math.abs(calculatePenalty(players[uid].cards || []));
                if(pen > maxPenalty) { maxPenalty = pen; resurrectedUid = uid; }
            });
            await setDoc(docRef, { phase: 'resurrection', resurrectedUid: resurrectedUid }, { merge: true });
        };

        window.resetGame = async () => {
            if(confirm("모든 데이터를 지울까요?")) await setDoc(docRef, DEFAULT_STATE);
        };

        function calculatePenalty(cardsArray) {
            if(!cardsArray || cardsArray.length === 0) return 0;
            let sorted = [...cardsArray].sort((a,b) => b - a);
            let sum = 0;
            for(let i=0; i<sorted.length; i++) {
                if(i === 0 || sorted[i] - sorted[i-1] !== -1) sum += sorted[i];
            }
            return sum;
        }

        function calculateResurrectionScore(cardsArray, isResurrected) {
            let pen = calculatePenalty(cardsArray);
            if(isResurrected) return Math.abs(pen); else return pen;
        }

        window.addEventListener('DOMContentLoaded', initAuth);
    </script>
</body>
</html>
